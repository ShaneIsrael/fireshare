#user  nginx;
worker_processes 1;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /usr/local/etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$http_x_forwarded_for - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$remote_addr"';

    server_tokens off;

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    include /usr/local/etc/nginx/conf.d/*.conf;

    server {
        listen 80 default;
        server_name default;

        root /processed/;

        location = /internal/video-auth {
            internal;
            proxy_pass              http://127.0.0.1:3001/api/video/nginx-auth;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
            proxy_set_header        Cookie $http_cookie;
        }

        location ~ ^/_content/derived/([^/]+)/thumbnail$ {
            set $video_id $1;
            root /processed/;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files /derived/$video_id/custom_poster.webp /derived/$video_id/poster.jpg =404;
        }

        location /_content/video/ {
            auth_request /internal/video-auth;
            alias /processed/video_links/;
            try_files $uri =404;
        }

        location /_content/image/ {
            alias /processed/image_links/;
            try_files $uri =404;
        }

        location /_content/ {
            alias /processed/;
            try_files $uri =404;
        }

        location / {
            root /app/build;
            index index.html;
        }

        location ~ /api/.*$ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~ /w/.*$ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }

        location ~ /i/.*$ {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $http_host;
            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
