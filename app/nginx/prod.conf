user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

thread_pool default threads=64 max_queue=131072;

events {
    worker_connections  4096;
    use epoll;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$http_x_forwarded_for - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$remote_addr"';

    server_tokens off;
    access_log  off;

    sendfile        on;
    sendfile_max_chunk 2m;
    tcp_nopush     on;
    tcp_nodelay    on;
    
    keepalive_timeout  65;
    keepalive_requests 100;
    
    client_body_buffer_size 256k;
    client_body_timeout 60s;

    proxy_cache_path /var/cache/nginx 
                     keys_zone=PROXYCACHE:200m
                     inactive=120m
                     max_size=2g
                     levels=1:2;
    
    proxy_cache_key  "$scheme$request_method$host$request_uri";
    add_header X-Cache-Status $upstream_cache_status;
    proxy_cache_min_uses 1;
    proxy_cache_revalidate on;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
    proxy_cache_background_update on;
    proxy_cache_lock on;
    proxy_cache_lock_timeout 10s;

    server {
        listen 80 default_server reuseport;
        server_name _;
        
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_proxied    any;
        gzip_comp_level 5;
        gzip_types
            application/atom+xml
            application/javascript
            application/json
            application/manifest+json
            application/x-font-ttf
            application/xml
            font/opentype
            image/svg+xml
            text/cache-manifest
            text/css
            text/plain
            text/xml;

        root /processed/;
        aio threads=default;

        open_file_cache max=10000 inactive=60s;
        open_file_cache_valid 120s;
        open_file_cache_min_uses 2;
        open_file_cache_errors on;

        location /_content/ {
            rewrite ^/_content/(.*)$ /$1 break;
            proxy_cache        PROXYCACHE;
            proxy_cache_valid 200 302 30m;
            proxy_cache_valid 404      5m;
            add_header Cache-Control "public, max-age=1800";
            root /processed/;
        }

        location = /internal/video-auth {
            internal;
            proxy_pass              http://127.0.0.1:5000/api/video/nginx-auth;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        X-Original-URI $request_uri;
            proxy_set_header        Cookie $http_cookie;
        }

        location ~ ^/_content/derived/([^/]+)/thumbnail$ {
            set $video_id $1;
            root /processed/;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files /derived/$video_id/custom_poster.webp /derived/$video_id/poster.jpg =404;
        }

        location ~ ^/_content/derived/ {
            auth_request /internal/video-auth;
            rewrite ^/_content/(.*)$ /$1 break;
            root /processed/;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        location /_content/video/ {
            auth_request /internal/video-auth;

            mp4;
            mp4_buffer_size 2m;
            mp4_max_buffer_size 50m;

            directio 4m;
            directio_alignment 512;
            output_buffers 2 2m;

            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Accept-Ranges bytes;

            limit_rate_after 5m;

            rewrite ^/_content/video/(.*)$ /$1 break;
            root /processed/video_links/;
        }

        location /_content/image/ {
            add_header Cache-Control "public, max-age=86400";
            rewrite ^/_content/image/(.*)$ /$1 break;
            root /processed/image_links/;
        }

        location ~ "^/error/([0-9]+)$" {
            internal;
            set $error_code $1;
            ssi on;
            root /etc/nginx;
            rewrite ^ /error.html break;
        }

        error_page 400 /error/400;
        error_page 401 /error/401;
        error_page 403 /error/403;
        error_page 404 /error/404;
        error_page 405 /error/405;
        error_page 408 /error/408;
        error_page 410 /error/410;
        error_page 413 /error/413;
        error_page 414 /error/414;
        error_page 429 /error/429;
        error_page 500 /error/500;
        error_page 502 /error/502;
        error_page 503 /error/503;
        error_page 504 /error/504;

        location / {
            proxy_cache        PROXYCACHE;
            proxy_cache_valid 200 302 60m;
            proxy_cache_valid 404      5m;
            add_header Cache-Control "public, max-age=3600";
            root /app/build;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        # SSE endpoint — must disable buffering/caching so events stream immediately
        location = /api/admin/stream {
            proxy_pass              http://127.0.0.1:5000;
            proxy_http_version      1.1;

            proxy_set_header        Connection "";
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        Host $http_host;
            proxy_set_header        X-Forwarded-Proto $scheme;

            proxy_buffering         off;
            proxy_cache             off;
            proxy_read_timeout      86400s;

            add_header              Cache-Control "no-cache";
            add_header              X-Accel-Buffering "no";
        }

        location ~ ^/api/game/assets/ {
            proxy_pass              http://127.0.0.1:5000;
            proxy_http_version      1.1;

            proxy_set_header        Connection "";
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        Host $http_host;
            proxy_set_header        X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 256k;
            proxy_buffers 8 256k;
            proxy_busy_buffers_size 512k;

            proxy_connect_timeout   60s;
            proxy_send_timeout      120s;
            proxy_read_timeout      60s;
            client_max_body_size 0;
        }

        location = /api/uploadChunked {
            proxy_pass              http://127.0.0.1:5000;
            proxy_http_version      1.1;

            proxy_set_header        Connection "";
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        Host $http_host;
            proxy_set_header        X-Forwarded-Proto $scheme;

            proxy_request_buffering off;
            client_max_body_size    0;

            proxy_connect_timeout   60s;
            proxy_send_timeout      120s;
            proxy_read_timeout      999999s;
        }

        location ~ /api/.*$ {
            proxy_pass              http://127.0.0.1:5000;
            proxy_http_version      1.1;

            proxy_set_header        Connection "";
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        Host $http_host;
            proxy_set_header        X-Forwarded-Proto $scheme;

            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;

            proxy_connect_timeout   60s;
            proxy_send_timeout      120s;
            proxy_read_timeout      999999s;
            client_max_body_size 0;
        }

        location ~ /w/.*$ {
            proxy_pass              http://127.0.0.1:5000;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        Host $http_host;
            proxy_connect_timeout   60s;
            proxy_read_timeout      60s;
        }

        location ~ /i/.*$ {
            proxy_pass              http://127.0.0.1:5000;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";
            proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header        X-Real-IP $remote_addr;
            proxy_set_header        Host $http_host;
            proxy_connect_timeout   60s;
            proxy_read_timeout      60s;
        }
    }
}
