version: "3"
services:
  fireshare:
    container_name: fireshare
    image: shaneisrael/fireshare:latest
    ports:
      - "8080:80"
    volumes:
      - ./dev_root/fireshare/data:/data
      - ./dev_root/fireshare/processed:/processed
      - ./dev_root/fireshare/videos:/videos
      - ./dev_root/fireshare/images:/images
    environment:
      # Credentials for the admin user. Change these before deploying to production!
      # After the first run, you can remove these variables in order to hide your username and password.
      # If you need to reset your username and password after the first run, you can set these variables again and restart the container, then log in with the new credentials and remove the variables again.
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - SECRET_KEY=replace_this_with_some_random_string
      - MINUTES_BETWEEN_VIDEO_SCANS=5
      # Required for game categorization. You can get a free api key at https://www.steamgriddb.com/
      # - STEAMGRIDDB_API_KEY=
      # The location in the video thumbnails are generated. A value between 0-100 where 50 would be the frame in the middle of the video file and 0 would be the first frame of the video.
      - THUMBNAIL_VIDEO_LOCATION=0
      # The domain your instance is hosted at. (do not add http or https) e.x: v.fireshare.net, this is required for opengraph to work correctly for shared links. DO NOT SURROUND IN QUOTES.
      - DOMAIN=
      - PUID=1000
      - PGID=1000
      # Enable transcoding to create 720p and 1080p variants (default: false)
      - ENABLE_TRANSCODING=false
      # Enable GPU acceleration for transcoding using NVENC (requires nvidia-docker runtime, default: false)
      - TRANSCODE_GPU=false
      # Required for GPU transcoding - enables NVIDIA driver capabilities
      # - NVIDIA_DRIVER_CAPABILITIES=all
      # Optional: inject an analytics tracking script into the frontend. Paste the full <script> tag from your analytics provider (e.g. Umami, Plausible, GoatCounter).
      # - ANALYTICS_TRACKING_SCRIPT=<script defer src="https://your-analytics-instance/script.js" data-website-id="your-id"></script>

    # Uncomment the following lines to enable GPU passthrough for transcoding
    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
